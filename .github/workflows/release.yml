name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ──────────────────────────────────────────
          - label: windows-x64
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            ext: .exe

          - label: windows-arm64
            platform: windows-latest
            target: aarch64-pc-windows-msvc
            archive: zip
            ext: .exe

          # ── macOS ────────────────────────────────────────────
          - label: macos-x64
            platform: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            ext: ""

          - label: macos-arm64
            platform: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            ext: ""

          # ── Linux ────────────────────────────────────────────
          - label: linux-x64
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            ext: ""

          - label: linux-arm64
            platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            ext: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../fucina-${{ matrix.label }}.${{ matrix.archive }} fucina${{ matrix.ext }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path target/${{ matrix.target }}/release/fucina${{ matrix.ext }} `
            -DestinationPath fucina-${{ matrix.label }}.${{ matrix.archive }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: fucina-${{ matrix.label }}.${{ matrix.archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
